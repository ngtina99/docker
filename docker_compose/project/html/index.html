<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Docker Page</title>

  <link rel="icon" href="/favicon.ico">

  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background-color: #dbc4ff;
    }

    h1 {
      margin-top: 40px;
      background-color: white;
      display: inline-block;
      padding: 10px 20px;
      border-radius: 10px;
    }

    img {
      display: block;
      margin: 20px auto;
      width: 200px;
    }

    p {
      background-color: white;
      display: inline-block;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 18px;
      color: #333;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <h1>Docker is working 🐳</h1>

  <img src="index.png" alt="My Image">

  <p>Served by Nginx and running inside a container</p>
  <p id="counter">Loading...</p>

    <script>
    fetch('/api/count')
        .then(res => res.json())
        .then(data => {
        document.getElementById('counter').innerText =
            "Visits: " + data.count;
        });
    </script>

</body>
</html>
